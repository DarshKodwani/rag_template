  <!-- BIL text -->
  <text x="100" y="145" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="70" font-weight="900" fill="#7B2382" text-anchor="middle">BIL</text>
  <!-- 1856 text -->
  <text x="70" y="228" font-family="'Helvetica Neue',Arial,sans-serif" font-size="24" font-weight="700" fill="#7B2382" text-anchor="middle" letter-spacing="2">1856</text>
</svg>